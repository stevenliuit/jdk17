name: Build JDK 17

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., jdk-17+11)'
        required: true
        default: 'jdk-17+11'
  push:
    branches: [master]

jobs:
  build-linux-x86:
    runs-on: ubuntu-latest
    container: adoptopenjdk/centos7_build_image:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies in container
        run: |
          yum -y install epel-release
          yum -y install \
            gcc gcc-c++ make autoconf automake \
            freetype-devel cups-devel libX11-devel libXext-devel \
            libXrender-devel libXrandr-devel libXtst-devel libXi-devel \
            alsa-lib-devel fontconfig-devel

      - name: Configure
        run: |
          bash configure --disable-warnings-as-errors \
            --with-conf-name=linux-x86_64-server-release \
            --with-version-opt=${{ github.run_number }}

      - name: Build
        run: make images JOBS=$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-x86-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm64
    container: adoptopenjdk/centos7_build_image:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies
        run: |
          yum -y install epel-release
          yum -y install \
            gcc gcc-c++ make autoconf automake \
            freetype-devel cups-devel libX11-devel libXext-devel \
            libXrender-devel libXrandr-devel libXtst-devel libXi-devel \
            alsa-lib-devel fontconfig-devel

      - name: Configure
        run: |
          bash configure --disable-warnings-as-errors \
            --with-conf-name=linux-aarch64-server-release \
            --with-version-opt=${{ github.run_number }}

      - name: Build
        run: make images JOBS=$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-arm64-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies
        run: |
          choco install -y make llvm autoconf zip

      - name: Configure
        shell: bash
        run: |
          ./configure --disable-warnings-as-errors \
            --openjdk-target=x86_64-pc-windows-msvc

      - name: Build
        shell: bash
        run: make images JOBS=$env:NUMBER_OF_PROCESSORS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-windows-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5