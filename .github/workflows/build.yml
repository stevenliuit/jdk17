name: Build JDK 17

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., jdk-17+11)'
        required: true
        default: 'jdk-17+11'
  push:
    branches: [master]

jobs:
  build-linux-x86:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Download JDK 15 as boot JDK
        run: |
          curl -sL https://github.com/adoptium/temurin15-binaries/releases/download/jdk-15.0.2%2B7/OpenJDK15U-jdk_x64_linux_hotspot_15.0.2_7.tar.gz -o boot-jdk.tar.gz
          mkdir -p boot-jdk
          tar -xzf boot-jdk.tar.gz -C boot-jdk --strip-components=1
          ls boot-jdk

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-10 g++-10 \
            autoconf automake libtool zip unzip \
            libfreetype6-dev \
            libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxi-dev libxt-dev \
            libasound2-dev libfontconfig1-dev

      - name: Configure
        env:
          JAVA_HOME: ${{ github.workspace }}/boot-jdk
        run: |
          CC=gcc-10 CXX=g++-10 bash configure \
            --disable-warnings-as-errors \
            --with-conf-name=linux-x86_64-server-release \
            --with-boot-jdk=$JAVA_HOME

      - name: Build
        run: make images JOBS=$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-x86-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Download JDK 15 as boot JDK
        run: |
          curl -sL https://github.com/adoptium/temurin15-binaries/releases/download/jdk-15.0.2%2B7/OpenJDK15U-jdk_aarch64_linux_hotspot_15.0.2_7.tar.gz -o boot-jdk.tar.gz
          mkdir -p boot-jdk
          tar -xzf boot-jdk.tar.gz -C boot-jdk --strip-components=1
          ls boot-jdk

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-10 g++-10 \
            autoconf automake libtool zip unzip \
            libfreetype6-dev \
            libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxi-dev libxt-dev \
            libasound2-dev libfontconfig1-dev

      - name: Configure
        env:
          JAVA_HOME: ${{ github.workspace }}/boot-jdk
        run: |
          CC=gcc-10 CXX=g++-10 bash configure \
            --disable-warnings-as-errors \
            --with-conf-name=linux-aarch64-server-release \
            --with-boot-jdk=$JAVA_HOME

      - name: Build
        run: make images JOBS=$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-arm64-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Download JDK 15 as boot JDK
        shell: bash
        run: |
          curl -sL https://github.com/adoptium/temurin15-binaries/releases/download/jdk-15.0.2%2B7/OpenJDK15U-jdk_x64_windows_hotspot_15.0.2_7.zip -o boot-jdk.zip
          unzip -q boot-jdk.zip
          ls

      - name: Install dependencies
        run: choco install -y make llvm autoconf zip

      - name: Configure
        shell: bash
        env:
          JAVA_HOME: ${{ github.workspace }}/jdk-15.0.2+7
        run: |
          ./configure --disable-warnings-as-errors \
            --openjdk-target=x86_64-pc-windows-msvc \
            --with-boot-jdk=$JAVA_HOME

      - name: Build
        shell: bash
        run: make images JOBS=$env:NUMBER_OF_PROCESSORS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-windows-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5