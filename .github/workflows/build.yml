name: Build JDK 17

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., jdk-17+11)'
        required: true
        default: 'jdk-17+11'
  push:
    branches: [master]

jobs:
  build-linux-x86:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-10 g++-10 \
            autoconf automake libtool zip unzip \
            freetype-devel libfreetype6-dev \
            libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxi-dev libxt-dev \
            libasound2-dev libfontconfig1-dev

      - name: Configure
        run: |
          CC=gcc-10 CXX=g++-10 bash configure \
            --disable-warnings-as-errors \
            --with-conf-name=linux-x86_64-server-release

      - name: Build
        run: make images JOBS=$(nproc) USE_JDK_ALLOCATOR=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-x86-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-10 g++-10 \
            autoconf automake libtool zip unzip \
            freetype-devel libfreetype6-dev \
            libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxi-dev libxt-dev \
            libasound2-dev libfontconfig1-dev

      - name: Configure
        run: |
          CC=gcc-10 CXX=g++-10 bash configure \
            --disable-warnings-as-errors \
            --with-conf-name=linux-aarch64-server-release

      - name: Build
        run: make images JOBS=$(nproc) USE_JDK_ALLOCATOR=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-linux-arm64-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      - name: Install dependencies
        run: choco install -y make llvm autoconf zip

      - name: Configure
        shell: bash
        run: |
          ./configure --disable-warnings-as-errors \
            --openjdk-target=x86_64-pc-windows-msvc

      - name: Build
        shell: bash
        run: make images JOBS=$env:NUMBER_OF_PROCESSORS USE_JDK_ALLOCATOR=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdk17-windows-${{ inputs.version }}
          path: build/*/images/jdk
          retention-days: 5