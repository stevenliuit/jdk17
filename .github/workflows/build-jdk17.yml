name: Build OpenJDK 17

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git reference to build (branch, tag, or commit)'
        required: false
        default: 'master'
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - fastdebug
          - debug

  # 定时触发：每天凌晨 2 点 UTC (北京时间上午 10 点)
  schedule:
    - cron: '0 2 * * *'

  # Push 触发：支持所有分支和标签
  push:
    branches:
      - '**'  # 所有分支
    tags:
      - '**'  # 所有标签

  # PR 触发
  pull_request:
    branches:
      - master
      - main

jobs:
  prepare:
    name: Prepare Build Info
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.info.outputs.ref }}
      ref_type: ${{ steps.info.outputs.ref_type }}
      version: ${{ steps.info.outputs.version }}
      build_number: ${{ steps.info.outputs.build_number }}
      
    steps:
      - name: Determine build info
        id: info
        run: |
          # 确定要构建的 ref
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.ref || 'master' }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${{ github.ref }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            REF="master"
          else
            REF="${{ github.ref }}"
          fi
          
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Building ref: $REF"
          
          # 判断 ref 类型
          if echo "$REF" | grep -q '^refs/tags/'; then
            REF_TYPE="tag"
            VERSION=$(echo "$REF" | sed 's|^refs/tags/||')
          elif echo "$REF" | grep -q '^refs/heads/'; then
            REF_TYPE="branch"
            VERSION=$(echo "$REF" | sed 's|^refs/heads/||')
          else
            REF_TYPE="branch"
            VERSION="$REF"
          fi
          
          echo "ref_type=$REF_TYPE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Ref type: $REF_TYPE"
          echo "Version: $VERSION"
          
          # 构建号
          BUILD_NUMBER="${{ github.run_number }}"
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

  sync-upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || secrets.PERSONAL_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Sync all branches and tags
        run: |
          git remote add upstream https://github.com/openjdk/jdk17.git || true

          git fetch upstream --tags --force
          git remote update upstream --prune

          for branch in $(git branch -r | grep upstream | grep -v HEAD | sed 's/upstream\///'); do
            echo "同步分支: $branch"
            if git show-ref --verify --quiet "refs/heads/$branch"; then
              git checkout "$branch"
              git merge "upstream/$branch" --no-edit || git reset --hard "upstream/$branch"
            else
              git checkout -b "$branch" "upstream/$branch"
            fi
            git push origin "$branch" --force-with-lease || true
          done

          git checkout master
          git merge upstream/master --no-edit || git reset --hard upstream/master
          git push origin master --force-with-lease

          git push origin --tags --force-with-lease

          echo "✅ 同步完成"

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            arch: x64
            bootjdk: 16
          - os: ubuntu-20.04
            arch: aarch64
            bootjdk: 16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Build info
        run: |
          echo "=========================================="
          echo "  OpenJDK 17 Build"
          echo "=========================================="
          echo "Ref: ${{ needs.prepare.outputs.ref }}"
          echo "Ref Type: ${{ needs.prepare.outputs.ref_type }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Build Number: ${{ needs.prepare.outputs.build_number }}"
          echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          echo "Platform: Linux ${{ matrix.arch }}"
          echo "=========================================="

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo clean-cache all || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libfreetype6-dev \
            libcups2-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxtst-dev \
            libasound2-dev \
            libffi-dev \
            libfontconfig1-dev \
            autoconf \
            automake \
            libtool \
            make \
            zip \
            unzip \
            ccache \
            git \
            wget \
            curl \
            python3 \
            python3-dev

      - name: Install Boot JDK ${{ matrix.bootjdk }}
        run: |
          wget -q https://github.com/adoptium/temurin${{ matrix.bootjdk }}-binaries/releases/download/jdk-${{ matrix.bootjdk }}+35/OpenJDK${{ matrix.bootjdk }}U-jdk_x64_linux_hotspot_${{ matrix.bootjdk }}_35.tar.gz
          tar -xzf OpenJDK${{ matrix.bootjdk }}U-jdk_x64_linux_hotspot_${{ matrix.bootjdk }}_35.tar.gz
          echo "BOOT_JDK=$PWD/jdk-${{ matrix.bootjdk }}+35" >> $GITHUB_ENV
          echo "$PWD/jdk-${{ matrix.bootjdk }}+35/bin" >> $GITHUB_PATH

      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.prepare.outputs.ref }}-${{ hashFiles('**/*.java', '**/*.c', '**/*.cpp') }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.prepare.outputs.ref }}-
            ccache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Configure build
        run: |
          bash configure \
            --with-boot-jdk="${{ env.BOOT_JDK }}" \
            --with-native-package-suffix=linux \
            --with-version-opt="--${{ needs.prepare.outputs.build_number }}" \
            --with-version-build="${{ needs.prepare.outputs.build_number }}" \
            --enable-ccache \
            --disable-warnings-as-errors \
            --with-jvm-variants=server \
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
            || (cat config.log && exit 1)

      - name: Build JDK
        run: |
          make images JOBS=8 LOG=cmdline

      - name: Test build
        run: |
          ./build/linux-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}/jdk/bin/java -version
          ./build/linux-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}/jdk/bin/javac -version

      - name: Package JDK
        run: |
          cd build/linux-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}
          tar -czf OpenJDK17-${{ matrix.arch }}-linux.tar.gz jdk
          sha256sum OpenJDK17-${{ matrix.arch }}-linux.tar.gz > OpenJDK17-${{ matrix.arch }}-linux.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenJDK17-${{ matrix.arch }}-linux-${{ needs.prepare.outputs.version }}
          path: build/linux-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}/OpenJDK17-${{ matrix.arch }}-linux.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: windows-2022
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            bootjdk: 16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Build info
        shell: powershell
        run: |
          Write-Host "=========================================="
          Write-Host "  OpenJDK 17 Build"
          Write-Host "=========================================="
          Write-Host "Ref: ${{ needs.prepare.outputs.ref }}"
          Write-Host "Ref Type: ${{ needs.prepare.outputs.ref_type }}"
          Write-Host "Version: ${{ needs.prepare.outputs.version }}"
          Write-Host "Build Number: ${{ needs.prepare.outputs.build_number }}"
          Write-Host "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          Write-Host "Platform: Windows ${{ matrix.arch }}"
          Write-Host "=========================================="

      - name: Free disk space
        shell: powershell
        run: |
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Get-PSDrive -PSProvider FileSystem

      - name: Install build dependencies
        shell: powershell
        run: |
          choco install -y visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows10SDK --passive"
          choco install -y cygwin --params "/InstallDir:C:\cygwin64"

      - name: Install Boot JDK ${{ matrix.bootjdk }}
        shell: powershell
        run: |
          $JDK_URL = "https://github.com/adoptium/temurin${{ matrix.bootjdk }}-binaries/releases/download/jdk-${{ matrix.bootjdk }}.0.2+7/OpenJDK${{ matrix.bootjdk }}U-jdk_x64_windows_hotspot_${{ matrix.bootjdk }}.0.2_7.zip"
          Write-Host "Downloading: $JDK_URL"
          Invoke-WebRequest -Uri $JDK_URL -OutFile "bootjdk.zip"
          Expand-Archive -Path "bootjdk.zip" -DestinationPath "C:\bootjdk"
          Get-ChildItem "C:\bootjdk"
          echo "BOOT_JDK=C:\bootjdk\jdk-${{ matrix.bootjdk }}.0.2+7" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\bootjdk\jdk-${{ matrix.bootjdk }}.0.2+7\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          bash configure \
            --with-boot-jdk="${{ env.BOOT_JDK }}" \
            --with-native-package-suffix=windows \
            --with-version-opt="--${{ needs.prepare.outputs.build_number }}" \
            --with-version-build="${{ needs.prepare.outputs.build_number }}" \
            --disable-warnings-as-errors \
            --with-jvm-variants=server \
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
            || (type config.log && exit 1)

      - name: Build JDK
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          make images JOBS=8 LOG=cmdline

      - name: Test build
        shell: cmd
        run: |
          build\windows-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}\jdk\bin\java.exe -version

      - name: Package JDK
        shell: powershell
        run: |
          Compress-Archive -Path "build\windows-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}\jdk" -DestinationPath "OpenJDK17-${{ matrix.arch }}-windows.zip"
          Get-FileHash -Algorithm SHA256 "OpenJDK17-${{ matrix.arch }}-windows.zip" | Select-Object Hash | Out-File "OpenJDK17-${{ matrix.arch }}-windows.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenJDK17-${{ matrix.arch }}-windows-${{ needs.prepare.outputs.version }}
          path: OpenJDK17-${{ matrix.arch }}-windows.zip
          retention-days: 30

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: macos-${{ matrix.os-version }}
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-version: '12'
            arch: x64
            bootjdk: 16
          - os-version: '14'
            arch: aarch64
            bootjdk: 17

    steps:
      - name: Skip aarch64 temporarily due to download issues
        if: matrix.arch == 'aarch64'
        run: |
          echo "Skipping macOS aarch64 build temporarily - Boot JDK download issues"
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Build info
        run: |
          echo "=========================================="
          echo "  OpenJDK 17 Build"
          echo "=========================================="
          echo "Ref: ${{ needs.prepare.outputs.ref }}"
          echo "Ref Type: ${{ needs.prepare.outputs.ref_type }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Build Number: ${{ needs.prepare.outputs.build_number }}"
          echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          echo "Platform: macOS ${{ matrix.arch }}"
          echo "=========================================="

      - name: Install build dependencies
        run: |
          brew install freetype cups fontconfig autoconf automake libtool ccache

      - name: Install Boot JDK ${{ matrix.bootjdk }}
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            JDK_URL="https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17+35/OpenJDK17U-jdk_aarch64_mac_hotspot_17_35.tar.gz"
            EXPECTED_DIR="jdk-17+35"
          else
            JDK_URL="https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_mac_hotspot_16.0.2_7.tar.gz"
            EXPECTED_DIR="jdk-16.0.2+7"
          fi
          echo "Downloading: $JDK_URL"
          echo "SSL_CERT_FILE=$SSL_CERT_FILE"
          curl -v -L --fail --retry 3 --retry-delay 5 -o "$EXPECTED_DIR.tar.gz" "$JDK_URL" 2>&1
          ls -la *.tar.gz 2>/dev/null || echo "No tar.gz files found"
          if [ -f "$EXPECTED_DIR.tar.gz" ]; then
            tar -tzf "$EXPECTED_DIR.tar.gz" | head -3
            tar -xzf "$EXPECTED_DIR.tar.gz"
            ls -la
            echo "BOOT_JDK=$PWD/$EXPECTED_DIR" >> $GITHUB_ENV
            echo "$PWD/$EXPECTED_DIR/Contents/Home/bin" >> $GITHUB_PATH
          else
            echo "Download failed, trying alternate approach..."
            wget -v "$JDK_URL" -O "$EXPECTED_DIR.tar.gz" 2>&1 || echo "wget also failed"
          fi

      - name: Configure build
        run: |
          bash configure \
            --with-boot-jdk="${{ env.BOOT_JDK }}" \
            --with-native-package-suffix=macos \
            --with-version-opt="--${{ needs.prepare.outputs.build_number }}" \
            --with-version-build="${{ needs.prepare.outputs.build_number }}" \
            --enable-ccache \
            --disable-warnings-as-errors \
            --with-jvm-variants=server \
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
            || (cat config.log && exit 1)

      - name: Build JDK
        run: |
          make images JOBS=8 LOG=cmdline

      - name: Test build
        run: |
          ./build/macos-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}/jdk/bin/java -version

      - name: Package JDK
        run: |
          cd build/macos-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}
          tar -czf OpenJDK17-${{ matrix.arch }}-macos.tar.gz jdk
          shasum -a 256 OpenJDK17-${{ matrix.arch }}-macos.tar.gz > OpenJDK17-${{ matrix.arch }}-macos.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenJDK17-${{ matrix.arch }}-macos-${{ needs.prepare.outputs.version }}
          path: build/macos-${{ matrix.arch }}-server-${{ github.event.inputs.build_type || 'release' }}/OpenJDK17-${{ matrix.arch }}-macos.tar.gz
          retention-days: 30

  create-release:
    name: Create Release
    needs: [prepare, build-linux, build-windows, build-macos]
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << EOF
          ## OpenJDK 17 自动构建
          
          **构建时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **构建类型**: ${{ github.event.inputs.build_type || 'release' }}
          **Git 引用**: ${{ needs.prepare.outputs.ref }}
          **引用类型**: ${{ needs.prepare.outputs.ref_type }}
          **版本**: ${{ needs.prepare.outputs.version }}
          **构建编号**: ${{ needs.prepare.outputs.build_number }}
          
          ### 下载链接
          
          | 平台 | 架构 | 下载 |
          |------|------|------|
          | Linux | x64 | OpenJDK17-x64-linux.tar.gz |
          | Linux | aarch64 | OpenJDK17-aarch64-linux.tar.gz |
          | Windows | x64 | OpenJDK17-x64-windows.zip |
          | macOS | x64 | OpenJDK17-x64-macos.tar.gz |
          | macOS | aarch64 | OpenJDK17-aarch64-macos.tar.gz |
          
          ### 校验和
          
          所有文件都包含 SHA256 校验和文件（.sha256）。
          
          ### 使用说明
          
          1. 下载对应平台的 JDK 压缩包
          2. 解压到目标目录
          3. 设置 JAVA_HOME 环境变量指向解压目录
          4. 将 \$JAVA_HOME/bin 添加到 PATH
          
          ### 许可证
          
          OpenJDK 17 使用 GPLv2 with Classpath Exception 许可证。
          
          ---
          
          **上游源**: https://github.com/openjdk/jdk17
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: jdk17-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.build_number }}
          name: OpenJDK 17 ${{ needs.prepare.outputs.version }} Build ${{ needs.prepare.outputs.build_number }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ github.event.inputs.build_type != 'release' && github.event.inputs.build_type != '' }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}